services:
  postgres:
    image: postgres:16-alpine
    container_name: thought_bot_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thought_bot
    ports:
      - "5432:5432"
    volumes:
      - thought_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thought_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  thought_bot_pgdata:
