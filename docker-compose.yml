services:
  postgres:
    image: postgres:16-alpine
    container_name: thinker_bot_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
      POSTGRES_DB: thinker_bot
    # Порт НАРУЖУ не пробрасываем — БД доступна только внутри docker-сети
    # (сервис bot ходит к ней по имени `postgres`). Это убирает атаки из интернета.
    # Если нужен доступ к БД с самого сервера для отладки — раскомментируй
    # строки ниже: слушать ТОЛЬКО localhost (127.0.0.1), а не 0.0.0.0.
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - thinker_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thinker_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: thinker_bot
    restart: unless-stopped
    env_file: .env
    # Внутри docker-сети БД доступна по имени сервиса `postgres`, а не localhost.
    # Перебиваем DATABASE_URL из .env, чтобы запуск работал из коробки.
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/thinker_bot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  thinker_bot_pgdata:
